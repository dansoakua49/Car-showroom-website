<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveSpace | Home</title>

    <style>
        /* GLOBAL */
        body {
            margin: 0;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
            color: white;
        }

        img {
            width: 100%;
            display: block;
        }

        h2 {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 28px;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon {
            width: 28px;
            cursor: pointer;
        }

        .logo {
            width: 120px;
        }

        /* DROPDOWN MENU */
        .menu {
            position: relative;
        }

        .dropdown {
            position: absolute;
            top: 40px;
            left: 0;
            background: #1a1a1a;
            padding: 10px 0;
            width: 180px;
            display: none;
            border-radius: 5px;
        }

        .dropdown li {
            list-style: none;
        }

        .dropdown li a {
            display: block;
            padding: 10px 15px;
            color: white;
            text-decoration: none;
        }

        .dropdown li a:hover {
            background: #333;
        }

        .menu:hover .dropdown {
            display: block;
        }

        /* HERO VIDEO */
        .hero {
            margin-top: 80px;
            position: relative;
        }

        .hero-video {
            width: 100%;
            height: 70vh;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
        }

        /* TRENDING GRID */
        .trending-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        /* REVIEWS SLIDER */
        .slider {
            width: 90%;
            margin: auto;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        .slide {
            min-width: 100%;
        }

        /* FOOTER */
        .footer {
            background: #111;
            padding: 30px;
            text-align: center;
        }

        .footer-links a {
            color: #aaa;
            margin: 0 10px;
            text-decoration: none;
        }

        .socials img {
            width: 30px;
            margin: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .trending-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .logo {
                width: 90px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="menu">
                <img src="images/menu-icon.png" alt="Menu" class="icon">

                <!-- DROPDOWN -->
                <ul class="dropdown">
                    <li><a href="about.html">About</a></li>
                    <li><a href="booking.html">Book Test Drive</a></li>
                    <li><a href="vehicles.html">Vehicles</a></li>
                    <li><a href="faqs.html">FAQs</a></li>
                    <li><a href="account.html">Account</a></li>
                </ul>
            </div>

            <img src="images/search-icon.png" alt="Search" class="icon">
        </div>

        <div class="header-center">
            <img src="images/logo.png" alt="Logo" class="logo">
        </div>

        <div class="header-right">
            <img src="images/world-icon.png" alt="Language" class="icon">
            <a href="account.html">
                <img src="images/account-icon.png" alt="Account" class="icon">
            </a>
        </div>
    </header>

    <!-- HERO VIDEO -->
    <section class="hero">
        <video autoplay muted loop class="hero-video">
            <source src="videos/hero-video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- TRENDING SEARCHES -->
    <section class="trending">
        <h2>Trending Searches</h2>

        <div class="trending-grid">
            <img src="images/trend1.jpg" alt="">
            <img src="images/trend2.jpg" alt="">
            <img src="images/trend3.jpg" alt="">
            <img src="images/trend4.jpg" alt="">
            <img src="images/trend5.jpg" alt="">
            <img src="images/trend6.jpg" alt="">
        </div>
    </section>

    <!-- REVIEWS SLIDESHOW -->
    <section class="reviews">
        <h2>Customer Reviews</h2>

        <div class="slider" id="slider">
            <div class="slide"><img src="images/review1.jpg" alt=""></div>
            <div class="slide"><img src="images/review2.jpg" alt=""></div>
            <div class="slide"><img src="images/review3.jpg" alt=""></div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 DriveSpace. All Rights Reserved.</p>

        <div class="footer-links">
            <a href="terms.html">Terms & Conditions</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="socials">
            <img src="images/facebook.png" alt="">
            <img src="images/instagram.png" alt="">
            <img src="images/twitter.png" alt="">
        </div>
    </footer>

    <script>
        // Reviews slider auto-scroll
        let slider = document.getElementById('slider');
        let index = 0;

        setInterval(() => {
            index++;
            if (index > 2) index = 0;
            slider.scrollTo({
                left: slider.clientWidth * index,
                behavior: "smooth"
            });
        }, 4000);
    </script>

</body>
</html>
